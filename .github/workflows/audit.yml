name: UDAAC Bot Hunt
on:
  issues:
    types: [opened, edited]

jobs:
  scan-sector:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-api-python-client flask

      - name: Deploy BOA Intelligence
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          VIDEO_ID: ${{ github.event.issue.title }}
          VIDEO_SUMMARY: ${{ github.event.issue.body }}
        run: python main.py

      - name: Post Intel Report
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body-path: 'comment.md'

      - name: Close Intelligence Report
        run: gh issue close ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
